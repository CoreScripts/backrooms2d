<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Backrooms 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #canvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>Loading...
  </div>

  <canvas id="canvas" width="960" height="600"></canvas>

  <script>
    var GAME_W = 960, GAME_H = 600;
    var canvas = document.getElementById("canvas");

    function resizeCanvas() {
      var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
      var w = Math.floor(GAME_W * scale);
      var h = Math.floor(GAME_H * scale);
      canvas.style.width  = w + "px";
      canvas.style.height = h + "px";
      // Keep transform centering intact regardless of Unity attribute changes
      canvas.style.transform = "translate(-50%, -50%)";
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // MutationObserver to re-apply scale if Unity overwrites style
    var observer = new MutationObserver(resizeCanvas);
    observer.observe(canvas, { attributes: true, attributeFilter: ["style", "width", "height"] });
  </script>

  <script src="7-21-23.loader.js"></script>
  <script>
    var loading = document.getElementById("loading");
    createUnityInstance(canvas, {
      dataUrl:      "7-21-23.data",
      frameworkUrl: "7-21-23.framework.js",
      codeUrl:      "7-21-23.wasm",
      companyName:  "",
      productName:  "",
      productVersion: ""
    }).then(function() {
      loading.style.display = "none";
    }).catch(function(err) {
      loading.innerHTML = "Error loading game";
      console.error(err);
    });
  </script>
</body>
</html>
