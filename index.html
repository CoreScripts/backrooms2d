<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Backrooms 2D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
      z-index: 100;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    Loading...
  </div>
  <div class="game-container">
    <canvas id="canvas" width="960" height="600"></canvas>
  </div>
  <script src="7-21-23.loader.js"></script>
  <script>
    var canvas = document.getElementById("canvas");
    var loading = document.getElementById("loading");

    createUnityInstance(canvas, {
      dataUrl: "7-21-23.data",
      frameworkUrl: "7-21-23.framework.js",
      codeUrl: "7-21-23.wasm",
      companyName: "",
      productName: "",
      productVersion: ""
    }).then(function() {
      loading.style.display = "none";
    }).catch(function(err) {
      loading.innerHTML = "Error loading game";
      console.error(err);
    });
  </script>
</body>
</html>
